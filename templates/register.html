{% extends "base.html" %}

{% block title %}Реєстрація — Arcova{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-card__header">
            <h2>Реєстрація</h2>
        </div>

        <div class="auth-card__body">
            <form method="POST">
                <div class="form-group">
                    <label for="username">Ім'я користувача</label>
                    <input type="text" id="username" name="username" placeholder="Введіть ім'я" required>
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Мінімум 6 символів" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Підтвердіть пароль</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторіть пароль" required>
                </div>

                <button type="submit" class="btn-submit">Зареєструватись</button>
            </form>
        </div>

        <div class="auth-card__footer">
            Вже маєте акаунт? <a href="{{ url_for('login') }}">Увійти</a>
        </div>
    </div>
</div>
{% endblock %}
