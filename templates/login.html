{% extends "base.html" %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вхід у систему</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Ім'я користувача</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Введіть ім'я" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Введіть пароль" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Увійти</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted small">
                Немає акаунту? <a href="{{ url_for('register') }}">Зареєструватись</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
