{% extends "base.html" %}

{% block title %}Вхід — Arcova{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-card__header">
            <h2>Вхід у систему</h2>
        </div>

        <div class="auth-card__body">
            <form method="POST">
                <div class="form-group">
                    <label for="username">Ім'я користувача</label>
                    <input type="text" id="username" name="username" placeholder="Введіть ім'я" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введіть пароль" required>
                </div>

                <button type="submit" class="btn-submit">Увійти</button>
            </form>
        </div>

        <div class="auth-card__footer">
            Немає акаунту? <a href="{{ url_for('register') }}">Зареєструватись</a>
        </div>
    </div>
</div>
{% endblock %}
